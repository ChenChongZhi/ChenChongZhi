name: Institutional pilot enquiry
description: Request a private discussion about a QAGE² Pharma Growth institutional pilot.
title: "Institutional pilot: [organisation type / region]"
body:
  - type: markdown
    attributes:
      value: |
        Do not include confidential information, patient data, personal contact lists, credentials, payment details or unpublished results. This public issue only requests a private follow-up route.
  - type: dropdown
    id: organisation
    attributes:
      label: Organisation type
      options:
        - Pharmaceutical company
        - Biotechnology company
        - CRO / CDMO
        - Academic or public research organisation
        - Industry association / accelerator
        - Other
    validations:
      required: true
  - type: dropdown
    id: function
    attributes:
      label: Primary function
      options:
        - R&D / Translational Science
        - Medical Affairs
        - Commercial / Market Access
        - Digital Innovation / AI
        - Business Development
        - Regulatory / MLR
        - Other
    validations:
      required: true
  - type: dropdown
    id: region
    attributes:
      label: Region
      options:
        - Global
        - North America
        - Europe / EEA
        - United Kingdom
        - Singapore / APAC
        - Japan
        - Middle East
        - Latin America
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Non-confidential pilot goal
      description: Describe the workflow to evaluate without naming patients, compounds, confidential programmes, personal contacts or payment information.
      placeholder: We want to evaluate evidence-aware campaign drafting and review workflow for a research platform.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: I will not post confidential, patient-identifiable or payment information in this issue.
          required: true
        - label: I understand the public prototype is not for clinical decision-making.
          required: true
