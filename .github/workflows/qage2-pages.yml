name: Deploy QAGE2 Pharma Growth to Pages

on:
  push:
    branches: ["main"]
    paths:
      - "site/**"
      - ".github/workflows/qage2-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Inject hosted checkout URL
        env:
          QAGE2_CHECKOUT_URL: ${{ vars.QAGE2_CHECKOUT_URL }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          path = Path("site/index.html")
          text = path.read_text(encoding="utf-8")
          url = os.environ.get("QAGE2_CHECKOUT_URL", "").strip()
          if url:
              if not url.startswith("https://"):
                  raise SystemExit("QAGE2_CHECKOUT_URL must be an HTTPS URL")
              text = text.replace("__QAGE2_CHECKOUT_URL__", url)
              path.write_text(text, encoding="utf-8")
          else:
              print("QAGE2_CHECKOUT_URL is not configured; checkout remains in setup mode.")
          PY
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
