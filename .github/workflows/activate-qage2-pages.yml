name: Activate and verify QAGE2 Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/activate-qage2-pages.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: qage2-pages-activation
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      pages_action: ${{ steps.pages.outputs.pages_action }}
      pages_http: ${{ steps.pages.outputs.pages_http }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Activate GitHub Pages API
        id: pages
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PAGES_API: https://api.github.com/repos/${{ github.repository }}/pages
        run: |
          set -u
          auth=(-H "Accept: application/vnd.github+json" -H "Authorization: Bearer ${GH_TOKEN}" -H "X-GitHub-Api-Version: 2022-11-28")
          get_code=$(curl -sS -o /tmp/pages-get.json -w '%{http_code}' "${auth[@]}" "$PAGES_API" || true)
          action="existing"
          final_code="$get_code"

          if [ "$get_code" = "404" ]; then
            final_code=$(curl -sS -o /tmp/pages-write.json -w '%{http_code}' -X POST "${auth[@]}" "$PAGES_API" -d '{"build_type":"workflow"}' || true)
            action="create"
          elif [ "$get_code" = "200" ]; then
            final_code=$(curl -sS -o /tmp/pages-write.json -w '%{http_code}' -X PUT "${auth[@]}" "$PAGES_API" -d '{"build_type":"workflow","https_enforced":true}' || true)
            action="update"
          else
            action="inspect"
          fi

          echo "pages_action=$action" >> "$GITHUB_OUTPUT"
          echo "pages_http=$final_code" >> "$GITHUB_OUTPUT"
          echo "Pages API: action=$action status=$final_code"
          cat /tmp/pages-write.json 2>/dev/null || cat /tmp/pages-get.json 2>/dev/null || true

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Inject hosted checkout URL when configured
        env:
          QAGE2_CHECKOUT_URL: ${{ vars.QAGE2_CHECKOUT_URL }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os

          path = Path("site/index.html")
          text = path.read_text(encoding="utf-8")
          url = os.environ.get("QAGE2_CHECKOUT_URL", "").strip()
          if url:
              if not url.startswith("https://"):
                  raise SystemExit("QAGE2_CHECKOUT_URL must be an HTTPS URL")
              text = text.replace("__QAGE2_CHECKOUT_URL__", url)
              path.write_text(text, encoding="utf-8")
          else:
              print("Checkout URL is not configured; the public site remains in safe setup mode.")
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: prepare
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    if: always()
    runs-on: ubuntu-latest
    needs: [prepare, deploy]
    permissions:
      contents: write
      pages: read
    env:
      GH_TOKEN: ${{ github.token }}
      SITE_URL: https://chenchongzhi.github.io/ChenChongZhi/
      PAGES_API: https://api.github.com/repos/${{ github.repository }}/pages
    steps:
      - name: Checkout current main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify public deployment
        shell: bash
        run: |
          set -u
          api_code=$(curl -sS -o /tmp/pages.json -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$PAGES_API" || true)

          site_code="000"
          marker="false"
          : > /tmp/site.html
          for attempt in $(seq 1 12); do
            site_code=$(curl -L -sS -o /tmp/site.html -w '%{http_code}' "$SITE_URL" || true)
            if [ "$site_code" = "200" ] && grep -q "QAGE² Pharma Growth" /tmp/site.html; then
              marker="true"
              break
            fi
            sleep 10
          done

          pages_status=$(python - <<'PY'
          import json
          from pathlib import Path
          try:
              data = json.loads(Path('/tmp/pages.json').read_text())
              print(data.get('status', data.get('message', 'unknown')))
          except Exception:
              print('unavailable')
          PY
          )

          cat > QAGE2_LIVE_STATUS.md <<EOF
          # QAGE² Live Hosting Status

          - Checked at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          - Repository: \`${{ github.repository }}\`
          - Main commit: \`${{ github.sha }}\`
          - Pages API activation action: \`${{ needs.prepare.outputs.pages_action || 'not-returned' }}\`
          - Pages API activation HTTP status: \`${{ needs.prepare.outputs.pages_http || 'not-returned' }}\`
          - Pages API verification HTTP status: \`$api_code\`
          - GitHub Pages status: \`$pages_status\`
          - Deployment job result: \`${{ needs.deploy.result }}\`
          - Public URL: $SITE_URL
          - Public HTTP status: \`$site_code\`
          - QAGE² application marker detected: \`$marker\`

          The payment button remains in setup mode until the repository variable \`QAGE2_CHECKOUT_URL\` contains a live provider-hosted HTTPS checkout for the one-time US\$10 payment.
          EOF

      - name: Commit verification report
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add QAGE2_LIVE_STATUS.md
          if git diff --cached --quiet; then
            echo "No status change to commit."
          else
            git commit -m "Record QAGE² Pages deployment status"
            git push origin HEAD:main
          fi
